<div class="page-layout">
  <div class="sidebar-section">
    <h2>Create New Route</h2>

    <div class="control-group">
      <label for="routeName">Route Name</label>

      <input
        type="text"
        id="routeName"
        [(ngModel)]="routeName"
        placeholder="e.g., Morning Run"
        class="text-input"
      />
    </div>

    <hr />

    <div class="control-group">
      <h3>Click the map or enter coordinates manually.</h3>

      <div class="manual-inputs">
        <div class="input-col">
          <label>Latitude</label>

          <input
            type="number"
            [ngModel]="manualLat()"
            (ngModelChange)="manualLat.set($event)"
            placeholder="Lat"
            class="text-input"
          />
        </div>

        <div class="input-col">
          <label>Longitude</label>

          <input
            type="number"
            [ngModel]="manualLon()"
            (ngModelChange)="manualLon.set($event)"
            placeholder="Lon"
            class="text-input"
          />
        </div>
      </div>

      <button class="btn-primary" (click)="addManualPoint()" [disabled]="!isManualAddValid">
        Add
      </button>
    </div>

    <hr />

    <div class="points-list-container">
      <h3>Route Points ({{ routeState.points().length }})</h3>

      <component-route-point-list></component-route-point-list>
    </div>

    <hr />

    <div class="action-buttons">
      <button class="btn-secondary" (click)="goBack()">Back</button>
      <button class="btn-danger" (click)="resetRoute()">Reset</button>
      <button class="btn-success" (click)="saveRoute()">Save Route</button>
    </div>
  </div>
</div>
